version: "3.9"

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: backgroundjobprocessingsystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "6969:6969"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/backgroundjobprocessingsystem?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: super_secret_jwt_key_change_me
      MIGRATIONS_PATH: ./migrations
      RATE_LIMIT: "100"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/backgroundjobprocessingsystem?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: super_secret_jwt_key_change_me
      WORKER_CONCURRENCY: "10"
      SHUTDOWN_GRACE_PERIOD: "30"

volumes:
  pgdata:
